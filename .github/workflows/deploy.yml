name: Deploy

on:
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  PROJECT_NAME: ${{ secrets.PROJECT_NAME }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Trivy Security Scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          format: table
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test --if-present

      - name: Lint (advisory)
        run: npm run lint --if-present || true

  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [test]
    # NOTE: We intentionally do NOT pass image_uri as a job output here.
    # GitHub Actions masks any output that contains the AWS account ID
    # (because it's embedded in the ECR registry URL), silently replacing
    # it with "***" and making the value empty in downstream jobs.
    # Instead, the provision job reconstructs the URI from its components.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          terraform_wrapper: false

      - name: Create ECR repository (if not exists)
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

          terraform apply -auto-approve \
            -target=aws_ecr_repository.app \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="image_uri=placeholder"

      - name: Build, scan, and push image
        id: build-push
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPO: ${{ secrets.PROJECT_NAME }}-app
          TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${REGISTRY}/${REPO}:${TAG}"

          echo "Building image: ${IMAGE_URI}"
          docker build -t "${IMAGE_URI}" .

          echo "Scanning image with Trivy..."
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image \
            --exit-code 0 \
            --severity HIGH,CRITICAL \
            --no-progress \
            "${IMAGE_URI}"

          echo "Pushing image: ${IMAGE_URI}"
          docker push "${IMAGE_URI}"

  provision:
    name: Provision Infrastructure
    runs-on: ubuntu-latest
    needs: [build]
    outputs:
      alb_dns_name: ${{ steps.tf-output.outputs.alb_dns_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          terraform_wrapper: false

      - name: Reconstruct image URI
        id: image
        run: |
          # Reconstruct the ECR image URI from its individual components.
          # We cannot rely on the cross-job output from the build job because
          # GitHub Actions suppresses any job output that contains a masked
          # secret value (the AWS account ID is part of the ECR hostname and
          # gets masked, making the output empty in downstream jobs).
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          IMAGE_URI="${ACCOUNT_ID}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.PROJECT_NAME }}-app:${{ github.sha }}"
          echo "Resolved image URI: ${IMAGE_URI}"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="image_uri=${{ steps.image.outputs.image_uri }}"

      - name: Capture Terraform outputs
        id: tf-output
        working-directory: terraform
        run: |
          ALB_DNS=$(terraform output -raw alb_dns_name)
          echo "alb_dns_name=${ALB_DNS}" >> "$GITHUB_OUTPUT"
          echo "App URL: http://${ALB_DNS}"

  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [provision]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Get ALB DNS from Terraform output
        id: get-endpoint
        working-directory: terraform
        run: |
          ALB_DNS=$(terraform output -raw alb_dns_name)
          echo "alb_dns=${ALB_DNS}" >> "$GITHUB_OUTPUT"
          echo "ALB DNS: ${ALB_DNS}"

      - name: Wait for ECS service to stabilize
        run: |
          echo "Waiting 90 seconds for ECS tasks to start and pass health checks..."
          sleep 90

      - name: Health check
        run: |
          ALB_DNS="${{ steps.get-endpoint.outputs.alb_dns }}"
          HEALTH_URL="http://${ALB_DNS}/health"

          echo "Probing: ${HEALTH_URL}"

          MAX_ATTEMPTS=20
          ATTEMPT=0
          SUCCESS=false

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Attempt ${ATTEMPT}/${MAX_ATTEMPTS}..."

            STATUS=$(curl -Lsf -o /dev/null -w "%{http_code}" \
              --connect-timeout 10 --max-time 30 \
              "${HEALTH_URL}" 2>/dev/null || echo "000")

            echo "HTTP status: ${STATUS}"

            if [[ "$STATUS" =~ ^[23] ]]; then
              echo "Health check passed with status ${STATUS}"
              SUCCESS=true
              break
            fi

            echo "Not ready yet (status=${STATUS}), waiting 15s..."
            sleep 15
          done

          if [ "$SUCCESS" != "true" ]; then
            echo "ERROR: Health check failed after ${MAX_ATTEMPTS} attempts"
            exit 1
          fi

      - name: Print deployment summary
        run: |-
          ALB_DNS="${{ steps.get-endpoint.outputs.alb_dns }}"
          echo "=========================================="
          echo "Deployment successful!"
          echo "App URL: http://${ALB_DNS}"
          echo "Health: http://${ALB_DNS}/health"
          echo "API:    http://${ALB_DNS}/api/info"
          echo "=========================================="
